<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Accent Border Gradient matching the theme -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89AACC" />
      <stop offset="100%" stop-color="#4E85BF" />
    </linearGradient>
    <!-- Inner Dark Background -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </radialGradient>
  </defs>
  
  <!-- Subtle Outer Glow -->
  <circle cx="256" cy="256" r="236" fill="url(#border-grad)" opacity="0.2" />
  
  <!-- Outer Border Ring -->
  <circle cx="256" cy="256" r="230" fill="url(#border-grad)" />
  
  <!-- Inner Circle Backdrop -->
  <circle cx="256" cy="256" r="218" fill="url(#bg-grad)" />
  
  <!-- Elegant "PG" Brand Text in Serif Italic -->
  <text 
    x="250" 
    y="322" 
    font-family="'Instrument Serif', Georgia, 'Times New Roman', serif" 
    font-size="230" 
    font-style="italic"
    font-weight="normal"
    fill="#ffffff" 
    text-anchor="middle"
    letter-spacing="-10"
  >PG</text>
</svg>